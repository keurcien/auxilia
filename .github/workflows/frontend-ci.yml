name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/frontend-ci.yml"
      - "Makefile"
      - "docker-compose*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  frontend:
    # Informational until maintainers require this status check in repository settings.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    env:
      CI: true
      HOME: /root
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint changed frontend files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || 'origin/main' }}"

          mapfile -t files < <(
            git -C "$GITHUB_WORKSPACE" diff --name-only --diff-filter=ACMRT "$BASE_SHA...HEAD" -- web \
              | grep -E '^web/.*\.(js|jsx|ts|tsx)$' \
              | sed 's#^web/##'
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed frontend files to lint."
            exit 0
          fi

          npm run lint -- "${files[@]}"

      - name: Build frontend
        run: npm run build

      - name: Run frontend unit tests
        run: npm run test

      - name: Run frontend visual regression test
        run: npm run test:visual

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: web/test-results/
          if-no-files-found: ignore
          retention-days: 7
